front:
  text: 上清握中訣卷下成十
  hash: sha256:4219808b345251a399e3f5ea4b90ff361efe4412ea28944bde30d0ea9e59c708
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0141_SJB_003-020906b, image: sjb/02/020906b.png}
body:
  text: 蘇君傳行事訣人頭有九宫兩眉間上却入三分爲守寸有青房紫戸二神居之一寸爲明堂宫有明童眞官明鏡神君明女眞宫三人居之二寸爲洞房宫有無英黄老白元三人居之三寸爲丹田泥丸宫有上元赤子帝卿二人居之四寸爲流珠宫流珠眞神居之五寸爲玉帝宫玉清神母居之明堂上一寸爲天庭宫上清眞女居之洞房上一寸爲極眞宫太極帝妃居之丹田上一寸爲玄丹宫太乙眞人居之流珠上一寸爲太皇宫太上君后居之凡一頭中有九宫並各方一寸其玉帝天庭極眞太皇四宫皆雌一之官其經當傳巳成眞人其餘玉宫巳行世而流珠經尚未見守一法立春日夜半東向平坐閉氣臨目握固兩膝上先存守寸中左有絳臺臺中有青房房中有神著青衣名正心字切方右有黄闕中有紫戸紫戸中有神著紫衣名平静字法王手並執流金鈴仍三呼其名微祝曰紫戸青房有二大神手把流鈴身坐風雲俠衛眞道不聽外前使我思感通利靈關出入貞利上登九門即見九眞太上之尊次存明堂中左有明童眞官名玄陽字少青中央有明鏡神君名照精字四明右有明女眞官名微隂字必元頭形並如嬰兒著緑錦衣腰帶四赤玉鈴口銜赤玉鏡長跪坐向外口並吐赤炁貫我身令帀及閉目微咽之又使鳴玉鈴聲聞太極吐鏡赤光萬丈須㬰赤炁繞身變成火燒身内外同光如一因三呼名字叩齒九通若飢渴存三君口吐赤炁灌我口因吸咽之若闇行存三君口出三火光以照前若處危難亦存三君鳴王鈴煥而擲之次存洞房中左有無英君著芙華冠御紫晨蓋佩流金鈴向外坐乃微祝曰三元英炁太玄紫晨黄闕金室中有大神華冠紫蓋龍衣虎文出丹入虚呼隂召陽天道有眞名曰無英扶我生我與我長存又存右有白元君著黄辰華冠龍文衣佩神虎符向外坐乃微祝曰太上神精正當神門龍衣虎帶黄辰華冠把籍持書是爲白元與我俱遊上到陽關周遊九清還安黄房此洞房法又常以夜半後生炁時按手兩膝閉炁冥目内視咽液百二十徧存無英君服色祝說如法又以日出東向再拜閉氣冥目内視咽液百二十過存白元君服色祝說如法又以甲子日夜半後被髮傅粉按手兩膝服氣咽液百四十過乃呼二神名字耳想聞如人應聲或有誦經音則是感應立春東向立夏南向立秋西向立冬北向春分日夜半正坐東向冥目存北斗星下紫氣大如絃從上直注我前令三一三卿及我合七人我在中央並覆帀七星杓指前鴈行共乘紫氣上登陽明星入中共坐並吞紫氣三十過畢乃悉更縁紫炁來下還入三宫中精思存之心祝曰三尊上眞太玄髙神陽明主春萬童開門丹元主夏朱紫合煙隂精主秋天威六陳北極主冬萬邪塞姦五土季王戊己天關所摧皆滅所向莫干錬我七魄和我三魂生我五藏使我得眞登飛上清浮景七元長生順往嘯命千神夏至南向登丹元星秋西向登隂精星冬至北向登北極星皆依此法若六月一日或十五日避夏至秋分當西南向俱乗絳紫青黄四氣共登天關星吞四色氣各十過先從絳始以次吞此謂五斗内法毎建日平旦存三一從三宫中出坐我前如實見之乃小起再拜心祝曰天尊三帝守其命門出遊雲中六氣玄分養我五神正我三魂五藏自生長生飛仙乃存從虚中還三宫中咽液三十過止除日夜半宻起向北仰視北斗存三一從輔星中下來各入我三宫中乃還寢靜思存而微祝曰太上天輔三帝所遊三卿扶胥與眞合俱下入我身安寂坐無吐精灌形魂魄和柔使我飛仙雲車行浮咽液二十過毎開日夜半起坐東向去巾亦可解之緩櫛之曰微祝曰上元三眞眞中嬰兒成愛開煙上通天台泥丸堅凝與天同時使卷飛仙交行洞臺咽液十九過乃巾而寢更存三一三卿各對坐其宫三一口呼氣三十過我亦自呼三十徧此建除開日存一法亦當如前以次從守寸始至三宫名字畢乃各依全法甲午甲辰甲寅日夜半出庭露壇上方一丈布席燒香北向再拜坐按手膝上仰視北斗存紫氣從斗出入我三宫中三一三卿與我俱乗紫氣上登北極星恍愡亡身如昇天之狀見北極中紫房玉階天官序列此七人侍帝前對坐論道請乞飛仙我乃心拜因是而還寢北帝是上清太上也别房在太極中耳次北向存玄丹宫中紫房緑室朱煙滿内有太一眞君名規英字化玄頭形並如嬰兒著紫繡錦衣腰帶流金火鈴左把北斗星柄右把北辰綱向外坐金牀玉帳存令分明見之乃又存北極星紫氣來下入宫滿溢出外帀身通洞合體又存日來入宫在紫氣中央曖曖然又存太一眞君從北極紫氣中來入日中坐又存我怱上入在君前對坐心起再拜稽首膝前問道求仙因吞紫氣三十過咽液三十過又存北斗内有一赤氣如弦徑下三宫太一與我乃俱乗日行赤氣上詣斗魁中寢因是而寢此法亦獨行不必待三一也月一日三日七日十一日十五日者夜半存太一眞君名字服色如前向外坐口吐青氣下入我口中隨咽之五十過止咽液五十過微祝曰太上眞皇中皇紫君厥諱規英字曰化玄金牀玉帳紫繡錦裙腰帶火鈴斬邪滅姦手把星精項生日眞正坐吐氣使我咽吞與我共語同宴玄丹錬灌七魄和柔三魂神靈奉衛使我飛仙五藏自生還白童顔受書上清司命帝官所願所欲百福惟新存我上入官在太一前寢息因此卧眠凡守一旦起皆咽液三十過存令赤色又手拭面耳令熱自非應存之日者唯存三一在三宫中安坐而巳至於玄宫自多存之勿令脱也若忽覺頭頸間色色惡者惡氣入也當急卧臨目存玄丹宫太一眞君以流火鈴煥而擲之令惡氣即出耳外火光亦隨之炯炯以照一身良乆平復也若忽耳鳴者是他鬼邪欲入故守寸三神令耳神嬌女雲儀磬鐘警備也錯手掩耳祝曰赤子在宫九眞在房請聽神命亦察不祥太一流火以滅萬凶手指耳門七過若臨飲食皆先存一飲食然後乃食畢心祝曰百榖入胃與神合氣塡𥙷血液尸邪亡墜長生天地飛登金闕役使六丁靈童奉衛常伺月初出向月再拜心祝曰太隂玄精明月夫人初生流光照我三宫神仙上飛髙遊八方所向所願與福神中八節之日朱書三元眞符平旦向王吞一枚畢再拜祝願隨意所言朔日初服十六日止後節復起如初又朱書白素錦囊盛佩頭上五年與眞一相見正月朔旦青書寳章北向再拜吞之又朱書白素佩左肘八年三一俱來相見以金長九寸廣四寸厚三分刻書之以封掌五嶽山精神也赤將子錬形法夜臨目向口吸取光存燒身使内外洞徹如火爲之三年能入火此周君訣守三元眞一五斗内法精止三月髣髴形見長生地眞守玄丹眞君十四年與太一同到七元之綱中十六年詣上清給玉童玉女各十八人茅君傳行事訣存明堂玄眞法寢靜之室平旦瞑目按手膝上旦存日夜存月並大如鐶以對口去之九尺日色赤有紫光九芒月色黄有白光十芒芒直如弦以入口日月中有太玄上玄丹霞玉女名纒璇字宻眞冠紫芙蓉著朱錦帔裙正向我面自稱如此因吐赤氣注我口中我隨吐隨咽九十過覺日月漸來簿面玉女口亦綴我口上氣液皆入我口中乃微祝曰太霄紫眞明堂隂神日月生精玉女纒璇先自靈誕厥字宻眞首巾紫華芙蓉靈冠身披錦帔朱丹飛裙出日入月天光幽芬口吐絳氣灌我三元面覩天井柔魄制魂玄液流行胎精長全五藏生華開童反顔監御萬靈司命飛仙存玉女口津液注我口漱滿咽之九十過正若不得服時當存二景還明堂中日左月右令光輝與目童合映又以月旦日本命日夜半東向朱書陽符青紙上黄書隂符青紙上乃臨目存日紫光月黄氣在明堂中明洞一身以左手執陽符閉氣心祝曰二景流精光映某形左廻日華右掇月英混合二氣灌漑三田飛霞玄映保固靈根使某長生天地同存服之畢再拜又右手執隂符閉氣祝曰黄氣隂華陽精洞鮮五神柔錬三左固津二景輝煥流霞灌眞隂陽通氣廻黄注丹舉體遁變上昇帝宫服之畢再拜行玄眞之道五年即感太玄玉女下降任人役使通靈致眞體生玉映役命萬神上昇玉房王君傳行事訣生氣時坐卧任意叩齒九通隂祝曰東方青牙紫雲流霞三素徘徊玄霜玉羅服食晨暉飲以朝華舌䑛接上唇外取津咽液三十過次叩齒九通祝曰南方朱丹霞暉太微九道絳烟散布景輝服食靈晨飲以丹池古䑛接下脣外取津咽液三十過次叩齒九通祝曰西方明石飛霞金液服食太明素雲之精飲以玊液神華啓靈使我登虚上昇髙清舌䑛上脣内取津咽液三十過次叩齒九通祝曰北方玄滋慶靈啓胎緑霞敷晨紫蓋蒼旗服食丹畢飲以瓊飴舌䑛下脣内取津咽液三十過次叩齒九通祝曰戊已之元黄素五雲四霞紫觀八景九晨二明激暉七曜靈尊和精灌氣服食中元琳華龍胎飲以醴泉舌漱滿口中齒舌間裏通帀取津液隨咽之四十過夜半後皆可行魏夫人傳行事訣暮燒香讀黄庭内景經一通别有經訣一卷旦夕朝靜法常行事不須䟽本命甲午後數得九十日是甲子凡二日平旦入靜燒香北向朝太微帝君微祝曰糞土小兆男生姓名謹稽首再拜朝太微天帝君王闕紫宫前當令某長生神仙所欲所願萬事成就司命紫簡記在玉皇得爲物宗登仙度世再拜正月一日後數一百八十二日夜半入靜燒香朝太上玉晨大道君跪微祝曰姓名小兆謹稽首再拜太上髙聖君瓊闕下乞得告下司命記籍長生所向所願萬物自成神仙飛仙得宴九天再拜列此三事皆先潔齋一日别衣服先朝靜然後爲之凡入靜皆先潔口閉氣入戸先前右足著前進左足併乃得趣行耳出戸勿反顧之漱口而退讀黄庭萬徧則自見五藏長生不死行此二朝法使人無疾戹不死十八年昇仙修行寳神訣掌摩兩掌令熱以拭面使帀熱令有光澤皺班不生出太素丹景經月五日十五日二十五日二十九日夜半存日象從口入在心中照心内光明祝曰太明育精内錬丹心光暉合映神眞來㝷咽液九過亦可日日行之不必此口日也使人開聦明察體生金澤出太上消魔經卧起平坐先收兩手乃度以掩項仰面與爭三四過乃屈動身體伸手四極反張側掣宣揺百關三過出太上洞精景經恒以手按兩眉後小宄中三九過又以手心及指摩目下顴上又以手旋耳行三十過又以手從眉中逆乘額上行入髮際三九過内存赤子日月雙明上元歡喜口傍咽液俠理開血散皺皰不生乆爲之徹見百靈右出裴君說寳神經上清握中訣卷下
