front:
  text: 上清握中訣卷上成八
  hash: sha256:8027cb81bcce37d564208aecadcdbe177936777c2685f73370f196ac0c6ffd44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0141_HFL_001-001a, image: hfl/0060/0060-100.png}
body:
  text: 闕文玄上太微北極紫蓋下有太眞遊翔九外翠華飛裙金鈴青帶腰佩玉光玄雲晻藹賜某隱書上行七氣登清戲煙眞人合㑹乞丏飛仙書名丹界所向所願無災無害有惡我者令彼傷敗次乗虚躡景從北極上俱上天關右手拊心左手指天關閉氣三息叩齒三通咽液三過微祝曰太上七極紫微絶辰寳玄金房外有玉門周運九宫調和天關中有尊神號曰紫皇授某隱書攜某乗龍上浮九天下飛地元景雲丹輿玄華翠裳腰佩龍䇿頭巾虎文包生萬物教化飛仙脫某死名天地長存乗龍歩斗所向受恩有惡我者風刀火燃逰行三命從天關上俱上輔星閉氣一息叩齒三通咽液一過微祝曰太極輔星精在紫關養生育命寳守神魂金房再開奉見輔君賜某隱書使某遊旋列名聖皇飛仙九天巾金佩眞出入洞門徘徊三陽從輔星上俱上弼星閉氣一息叩齒三通咽液一過微祝曰太虚泥丸紫宫天尊玄空眞紐爲帝之先精入明堂彊胎益魂朱山再開奉迎靈元左挹日華右掇月根流火萬丈金羅碧裙腰帶虎符首戴花冠賜某隱書得行天關乞願飛仙役使萬神萬向皆㑹福德如山朝四極春歩綱畢正身入魁中東向視𡻕星象在肝中再拜跪祝曰太𡻕元神木公九元陽華玄元盡來入身叩齒九通畢登天旋出夏歩綱畢正身入魁中南向視熒惑星象在心中再拜跪祝曰南上元神火陽四光重離丹火來入丹房叩齒九通畢登天旋出秋歩綱畢正身入魁中西向視太白星象在肺中再拜跪祝曰西上太玄金精七道玉元二帝氣回胎腦叩齒九通畢登天旋出冬歩綱畢正身入魁中北向視辰星象在腎中再拜跪祝曰北玄紫辰金車水元龍胎化靈來入一身叩齒九通畢登天旋出甲子日八節日歩綱畢正身入魁中弼星後向眞人存鎮星象在脾中再拜跪祝曰太極九眞流康隂根飛一華蓋來入泥丸叩齒九通畢登天旋而出歩綱脫死名上玉録法亦如此但用有異耳右六甲日歩者出仍左廻向下台閉氣隨綱禹歩躡星上至金上先以左足在前右足撤後共上一星至金畢仍轉右足在前躡星還往還九過畢住金上叩齒三下通氣祝曰上台虚精中台六淳下台曲生若願金玉呼上台言之願禄位呼中台言之願田土呼下台言之三事隨人意所乞乃隨綱下散歩還登五星也次歩五星先向綱口臨目閉氣叩齒五通咽液五過存五星精各在五藏中星形及芒数並藏内光明照徹微祝曰五星列照煥明五方水星却災木星致昌熒惑消禍太白辟兵鎮星四㨿我得利貞名刋玉簡録字帝房乗飊扇景飛騰太空出入冥无遊宴十方五雲浮蓋招神攝風役使萬靈上衛仙公又心祝五星皇君夫人名字依八數所呼法也通息更閉乃越綱蹈星左足上金右足進併隨方靣向之左手拊心曰飛仙次上土當轉足向火也上火上木上水又倒上木凡倒還皆先舉右足如此往還三過又依圖上金上火上土當順足向木也上木上水又倒上木如此往還十五過止乃下恐亡去亦可屈指數之左廻向綱口存祝如每至星上皆併足左手拊心呼所至星皇君君夫人名字心祝飛仙都畢乃跪卷圖而還燒香再拜若見兇鬼惡人存斗星覆頭以杓指前閉氣心祝曰吾是天目與天相遂精若雷電明曜八域徹知表裏無所不伏行飛歩一年辟非二年辟兵三年辟死四年地仙行之十四年爲上清眞人列紀行事訣月晦日夜半東向朱書日氣符於青紙上黄書月精符於青紙上先左手執日符閉氣心祝曰太微丹書名曰開明致日上魂來化某形平旦嚴裝發自圓庭飛華水母日根金精紫映流光號爲五靈乃服之又右手執月符閉氣心祝曰紫微黄書名曰太玄致月華水養魄和魂方中嚴事發自玄關藏天隱月五靈夫人飛光九道映朗泥丸乃服之服日氣法平旦伺日初出乃對日坐立任意叩齒九通心呼日魂珠景照韜緑映廻霞赤童玄炎飊像仍冥目握固存日中五色流霞皆來接身下至兩足上至頭頂又令光霞中有紫氣如目童累數十重與五色俱來入口吞之四十五咽氣又咽液九過叩齒九通微祝曰赤爐丹氣圓天育精剛以受柔炎水隂英日辰元景號曰大明九陽齊化二煙俱生凝魂和魄五氣之精中生五帝乗光御形探飛以虚掇根得盈首巾龍蓋披朱帶青轡鳥流玄霞映上清賜書玉簡金閣刻名服食朝華與眞合靈飛仙太微上昇紫庭再拜服月精法伺月初出對月坐立任意叩齒十通心呼月魄曖蕭芬豔翳寥婉虚靈蘭鬰華結翹淳金清瑩炅容䑓標仍冥目握固存月中五色流精皆來接身下至兩足上至頭頂又令光精中有黄氣如目童累數十重與五色俱來入口吞之五十咽氣又咽液十過叩齒十通微祝曰黄青玄暉元隂上氣散蔚寒飊條靈歛胃靈波蘭穎挺濯渟器月精夜景玄宫上貴五君夫人各保母位赤子飛入嬰兒續至廻隂三合光玄萬方和魂制魄五胎流通乗霞飛精逸虚於東首結靈雲㬌華招風左帶龍符右腰虎章鳯羽朱帔玉珮金璫騫樹結阿號曰木王神蟇控根有虧有充明精内映玄水吐梁賜書玉札刻名靈房服食月華與眞合同飛仙紫微上朝太皇再拜若天陰可於寝室存之山林中旦夕恒行拘三魂法其日夕卧去枕向上伸足交手心上冥目閉氣三息叩齒三通存心有赤炁如雞子從内仰上從目中出外轉大覆身變成火燒身周帀内外洞徹如一覺體中小熱叩齒三通呼爽靈胎光幽精三神急住因微祝曰太微玄宫中黄始青内錬三魂胎光安寜神寳玉室與我俱生不得妄動監者太靈若欲飛行唯得詣太極上清若欲飢渴唯得飲徊水玉精制七魄法其日夕卧向上伸足兩手掌掩兩耳當使指端接交頸中冥目閉氣七過叩齒七通存鼻中端有白氣如小豆須㬰漸大冠身九重忽又各變成天獸兩青龍在兩目中兩白虎在鼻兩孔中頭皆向外朱雀在心上向人口蒼龜在左足下靈蛇在右足下頭亦向上玉女著玄錦衣兩手各把火光當耳門如此良乆咽液七過叩齒七通呼尸狗伏矢雀隂吞賊非毒除穢臭肺又微祝曰素氣九廻制魄却姦天獸守門嬌女執關鍊魄和柔與我相安不得妄動看察形源若汝飢渴聽飲月黄日丹凡暮卧先存泥丸宫赤子字三元先一名帝卿赤衣絳宫眞人字子南丹一名中光堅赤衣丹田宫嬰兒字元陽子一名谷下玄黄衣凡六人頭並如嬰兒有金光玉色又存臍中命門玄闕生宫大君箸朱衣巾紫蓉冠手執天皇象符向外坐三魂神侍側乃閉氣二十四息心呼挑孩字合延三過咽液五十過叩齒三通微祝曰胎靈大神皇綱天君手執胞符首巾紫冠黄廻赤轉上精命門化神反生六合相因形骸光澤玉女奉身先存此乃拘魂制魂又以月朔望日夜半朱書天皇象符於青紙上北向左手執符閉氣心祝曰天帝玄書皇象靈符以合元氣運精反胎萬年嬰孩飛仙天樞生宫大神披丹建朱首戴紫蓉與我同謀服畢再拜但於所寝牀上服之行列紀事一十八年乗華三素飛行太空上清握中訣卷上
