front:
  text: 上清握中訣卷中成九
  hash: sha256:5657761dfb599c29e5abdfa7f3783f73a5790c2903fd3ebf187bc2df4a87828b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0141_HFL_002-001a, image: hfl/0060/0060-116.png}
body:
  text: 守玄丹法其月一日三日七日十一日十五日夜半所存即與三一同法其常日夕當依今事其暮夕靜寢去諸思念先存北極辰星出一紫氣如弦來下入玄丹宫須㬰滿宫溢出外帀身通洞與紫氣合體又存日忽飛來入宫在紫氣中晃晃然乃存上清中黄太一眞君從北極紫氣中來入日中坐服色名字把執悉如前因三呼位號名字忽存我入在太一前再拜稽首問道求仙因乃咽紫氣三十過咽液三十過又存北斗魁中出一赤氣如弦直入來玄丹宫於是眞君與我共乗日入行赤氣道中上詣魁中寢注想令分明於是仍以寢即有眞感其非夕時亦當恒存太一在玄丹宫并出紫氣以繞身及咽之也若聞耳鳴錯手掩耳祝曰赤子在宫九眞在房請聽神命亦察不祥太一流火以威萬凶手指耳門七過覺面熱者佳若項間色色寒者惡氣入當急卧臨目存玄丹太一眞君以火鈴煥而擲之令惡炁即出耳外火光亦隨之炯炯以照映一身良乆平復凡諸聞見不吉並精存眞君以求救護則萬凶不干大靜法守一之人每以甲午甲辰甲寅日夜半掃除靜寢之庭亦可作壇方一丈障四面布席燒香向北再拜平坐按手臨目存三宫三一如法又存三素雲氣各在宫中三人在氣中三素者紫青絳衣次重沓之因仰視北斗存紫氣從魁中出如弦直來入口分注三宫於是三一三卿及我乗三素雲忽出共乗紫氣上登斗魁因乗三素度入北極中見紫房玉階天官序列太一帝君巾紫晨冠龍錦鳯衣向南坐我等七人登階北向拜求乞飛眞長生之道良乆自忘如在天上乆乆乃宻起還寢隂雨可於寢牀存之上建日平旦向王平坐閉氣臨目内視三宫三一三卿如法乃存忽出在我前對坐我乃心起各再拜令如見乃心祝曰天尊三帝守某命門出游虚中六氣玄分養我五神正我三魂五藏自生長生飛仙又存從虚中忽還三宫如法而住乃咽液三十過乆行之當夢見金玉白鳥諸物見一之漸也上除日夜半宻起向北仰視北斗内像輔弼之形忽見三一三卿從輔星中出來下入三宫中仍還室更閉氣臨目内視精思如法良乆微祝曰太上天輔三帝所逰三卿從胥與眞合俱下入我身安寂坐無吐精灌形魂魄和濡使我飛仙雲車行浮咽液二十七過每開日夜半起坐東向去巾亦可解髮更㧧結之臨目内視微呼曰上元三眞眞中嬰兒散髮開煙上通天台泥丸堅凝與天同時使我飛仙交行洞臺咽液十九過乃巾而卧更存三一宫中呼氣三十過我亦自呼氣三十過當覺今身中薰薰熱則和魄凝魂之驗月初出向月再拜存月白光十芒來接我身洞照三宫乃心祝曰太隂玄精明月夫人初生流光照我三宫神仙上飛髙遊八方所向所願皆與福中亦可再拜臨食初就食皆先正心目想三一各於其宫遥共歆饗畢乃食食畢心祝曰百穀入胃與神合氣塡補血液尸邪亡墜長生天地飛登玉闕役使六丁靈童奉衛巾斗却惡守一出入行住恒存北斗覆頭柄指前令天關去面七尺如此百邪凶氣不敢干犯也㝷此要訣亦可兼作飛歩祝曰吾是天目與天相逐精若電雷明曜八域徹視表裏無物不伏吸火錬形夜臨目向火口吸取火光咽之無數存覺身帀體洞然如火良乆乃止三年行之能入火坐此赤將子錬形法朝太素正月九日二月八日三月七日四月六日五月五日六月四日七月三日八月二日九月一日十月十日十一月十一日十二月十二日夜於寢靜室北向再拜稽首跪曰謹啓太上大道髙虚玉晨太素紫宫八靈三元君中央黄老无英白元太帝五老髙眞上仙太極黄精三皇玉君大洞三景弟子某甲謹以告日之夜天關九開之間上聞太上玉皇眞君乞得長生世上壽無億年時乗黄晨緑蓋龍轅上詣紫庭役使萬神侍衛四明畢勿令人知云施行太丹隱書存三元洞房者此謂修先進之法非關三一乃諸訣法若未行此道謂亦不得用此拜請而此日是月中吉辰宜爲諸善事朝玉晨正月四日二月八日三月十五日四月八日五月九日六月六日七月七日八月八日九月九日十月五日十一月三日十二月十二日平旦日出時北向再拜自陳本懷所願畢咽液三十六過云此日太上大道玉晨君登玉霄琳房四眄天下有志節逺遊之心者是故令拜請先應呼位號如朝法云糞土小兆某甲乞願云云也若雨雪可於靜室中啓請畢更再拜仍長跪咽液止朝青君丁卯日日出向日再拜請乞九月後正月前日出同其方可因此以服日精此日東海青童登方諸東華臺四望按方諸在㑹稽東小成九五近南著則應對乙地若夏月日出東北便不得正向日存拜東華所在啓請若請乞畢又再拜乃修日事受者但吸服霞精而九咽之精思常以二月二日三月三日八月八日九月九日十月十日夜於寢室存思洞中訣事燒香念眞精苦勿眠如有所待兼愼於其日益善云修洞訣者其日衛經玉童玉女將太極典禁眞人來於空中觀察善惡故令謹愼勿爲他事唯營道務修諸善法也惡夢若遇惡夢覺以左手捻人中二七過啄齒二七通微祝曰大洞眞玄張錬三魂第一魂速守魄第二魂速守泥丸第三魂受心節度速啓太上三元君向遇不祥之夢是七魄遊尸來俠邪源急召桃康護命消滅惡津反凶成吉生死无縁畢又卧必獲善應云數遇惡夢者一曰魄祅二曰心試三曰尸賊故令厭消則受閉三關之下反凶爲吉也善夢若遇善夢卧覺當摩目二七過叩齒二七通微祝曰太上髙精三帝丹靈絳宫明徹吉感告情三元柔魄天皇授經所向諧合飛仙上清常與玉眞俱㑹紫庭此善惡二夢祝法出太丹洞房事若未受此經不敢朝拜所求而行此二夢祝謂非當也夫夢惡者明旦當啓太上以正魂魄折除不祥當朝拜仍啓乞首謝除之枕麝香一具於頸間辟水注之氣絶惡夢也若毎夢塜墓及亡者卧覺正向上三啄齒而祝之曰太元上玄九都紫天理魂護命髙素眞人我受上法受教太玄長生乆視神飛體仙塜墓永安鬼訟塞姦魂魄和恱惡氣不煙遊鬽莫覬切岡象敢干我神北帝呵制收氣入淵得籙上皇謹奏玉晨如此者再祝祝又三叩齒云此北帝秘祝凡得諸惡夢不祥者可皆按此法有心者並可行之夜卧覺常更急閉目叩齒九通咽液九過畢以手按鼻之邊左右上下數十過微祝曰太上四明九門發精耳目玄徹通眞達靈天中之臺流氣調平嬌女雲儀眼童英明華聦炅朗百度眇清保和上元徘徊九城五藏植根耳目自生天臺鬱素柱梁不傾七魄澡鍊三魂安寧赤子攜景輙與我并有敢掩我耳目太上當摧以流鈴萬凶消滅所願必成日月守門心藏五星眞皇所祝群響敬聽畢又咽液九過摩拭面目令小熱以爲常卧覺輙按祝如此勿失一卧也云此是眞人起居常行之道恒坐卧爲之今耳目聦明而有童顏制魂錬魄却辟千魔也夜卧覺存日象在疾手中握之使日光赤芒從臂中逆至肘腋間良乆日芒忽變成火以燒臂使内外通帀洞徹良乆乃隂祝曰四明上元日月氣分流光煥曜灌液凝魂神火散景盪穢錬煙洞徹風氣百邪燔然使得長生四支完全注害考鬼收付北辰畢存思良乆放身自忘云患手風者如此若頭面餘處風齊亦各隨其處依此法燒祝之常以生氣時咽液二七過按體所痛處向王而祝曰左玄右玄三神合眞左黄右黄六華相當風氣鬼疾伏匿四方玉液流澤上下宣通内遣水火外辟不祥長生飛仙身常休彊畢又咽液二十七過常如此則无疾云又當急按所痛處三十一遇如此則向疾急按而祝祝畢又作數次乃止此痛處亦當无指的所在也手臂不援者先以一手徐徐按摩疾臂良乆畢乃臨目内視叩齒咽液三過正心微祝曰太上四玄五華六庭三魂七魄天關地精神府營衛天台上明四支百神九節萬靈受籙玉晨刋書玉城玉女侍身玉童護命永齊二景飛仙上清長與日月年俱後傾超騰昇仙得整太平流風結痾注鬼五飛魍魎塜氣隂氣相凌徊我四支干我盛衰太上天丁龍虎曜威斬鬼不祥風邪即摧考注匿訟百毒隱非使我復常日月同暉考注見犯北辰收摧如干明威云此是北帝曲折祝諸有曲折者皆用此法自不能按亦可令人按而已猶内視咽液啄齒祝之行之百過疾消除也夜卧先急閉目東向以手大指後掌各左右按拭目就耳門使兩掌俱交㑹於項中三九過存目中各有紫青絳三色氣出目前乃隂祝曰眼童三雲兩目眞君英明注精開通清神太玄雲儀靈嬌翩翩保利雙闕啓徹九門百節應響朝液泥丸身昇玉宫列爲上眞畢咽液五十過乃開目以爲常坐起可行之不必夜要當以生氣時云行此一年耳目便清明乆爲之徹視千里羅映神靈如此則非必夜卧從子時後至日旦中有暇便爲之要當常東向也中暮咽液三九過以手急隂按天眞在兩眉内角山源鼻下人中小入谷裏華庭在兩眉下凹中隂數三九過按而祝曰開通天庭使我長生徹視萬里魂魄反嬰滅鬼却魔來致千靈上昇太上與日合并得補眞人列像玄名云令人致靈徹視杜遏萬邪如此亦可以次各按亦可一時俱按就按中行祝之恒以手按兩眉後小宂中三九過又以手心及指摩兩目下顴上又以手旋耳行三十過畢輙以手逆乗額三九過從眉中始上行入髮際中口傍咽液多少無數頭四面亦以兩手乗之順髮就結唯令多都畢乃以指按目四眥二九覺令見光分明勤而行之唯令數無時節也行之一年可夜書乆爲之得見百靈此道出太上寳神經中巳成眞人猶不廢之如此無拘時節有暇便行面上常欲兩手摩拭使熱謂先摩切兩掌令熱乃以拭面又順髪向結兩手更互摩之卧起先以手巾帛拭項中四面及耳後皆使温温然又順髮摩頭又摩掌以治面目都畢咽液三十過卧起當平氣正坐先义兩手乃度以掩項後因仰面使項與手爭三四過仍屈動身體伸手四極反張側掣宣摇百關爲之各三謂此精景按摩法使精和血通風氣不入乆行之不死不病常欲以手按目近鼻之兩眥閉氣爲之氣通輙止吐而復始恒行之眼能洞觀耳欲數按抑其左右令無數鼻亦欲爾又常以手掩口鼻臨目微氣乆時手中生液追以摩面目使人體香坐常欲閉目内視存見五藏腸胃乆行之自得分明常欲閉目而卧安身微氣乃内視逺聽四方令我耳目注萬里之外精心爲之乃見百里外事亦恒聞金石絲竹之聲初雖無髣髴乆乆誠自入妙謂初先起一方從近而逺百里千里萬里竟更一方始都徧又存令通无隔礙也櫛頭理髮當向王地櫛髮之始微祝曰泥丸玄華保精長存右爲隱月左爲日根六合精錬萬神受恩畢咽液三過澡洗時常存六丁令人所向如願六丁各隨其旬亦應向其方面當數沐浴浴不患數患人不能耳盪錬尸臭而眞炁來入每至甲子當沭不爾當以幾月旦使人通靈若履殗穢及諸不淨處當洗澡浴盟解形以除之其法用竹葉十兩桃皮削取白四兩以清水一斛二斗煑令一沸適寒温以浴形即萬殗消除也謂若浴者益隹但不用此水以沐浴錬形之素漿正宜以浴耳如便不得以此汁沐頭更别依常沐法也又云世間符水祝漱水含之近術皆莫比於此方也如此亦許有符水别法正一道士乃自有常用而八吏六甲别有一符水於解殗爲勝令輙附䟽於此幸可兼用之朱書白紙如此巳著清水中向王左手執水器右手執一劒叩齒三通嘘水祝曰百殗之鬼速去萬里不去斬死西方白童子輙以劒三叩器邊又祝又叩齒凡三過止因取水漱口自身他身及穢處所殗便解不必須浴服仙藥常向本命服畢勿道死喪凶事犯傷胎神徒服無益臨食上勿道死事勿露食物來衆邪氣食欲向本命及王氣上道法布衣不假人車服牀寢不共之也坐卧室宇當令潔淨則受靈氣不淨則受故氣故氣之亂室宇者所爲不成所作不立一身亦當數洗浴澡潔不爾仙道無冀沐浴不數魄之性也違魄反眞是錬其濁穢魄日亡矣數沐浴常存六丁令人所向如願愼勿道學道學鬼犯人亦不懼立使人病是體未眞故也凡冩經書當恒燒香左右凡精思皆燒香於左右性躁暴者一身之賊病每事皆當柔遲而盡精潔之理夫欲學道者皆當勿令人知見所聞每事盡爾存日在心法以月五日十五日二十九日夜半存日從口入在心中照一心之内與日共光相合㑹良乆當覺心暖乃祝曰大明育精内錬丹心光輝合映神眞來尋咽液九過又云行之務欲數不必拘此數日可夕夕爲之云是太虚赤君内法服日月象法男服日象女服月象日一勿廢云書作日月守而服之不說早晚今可併朱書青紙作日字方九分剪爲數千每平旦東向左手執存爲日形光芒如法乃吞入今住心中因叩齒咽液各九過女應以黄書月象右手執服之云是東華眞人法服日芒法日月摹别服眞形在隱訣中平坐臨目直存心中有日象大如錢赤色紫光九芒從心上出喉至齒間未出齒而廻還胃中良乆存見心胃中分明乃吐氣漱液服液三十九過止一日三爲之此當以平旦東向日中南向晡時西向服月芒法夜存月在泥丸中黄色有白光十芒亦未出齒而廻入胃按此亦應一夜三爲之當以亥子丑時月徑一寸在丹田宫其十白芒流下口中咽入喉到胃令白光照徹亦應吐氣服液三十九過卧存之亦可此西城王君說東華中法令日月常照身中則鬼无藏形行此不止保見太平服三氣法常以平旦向日臨目存青氣白氣赤氣各如線從日下來直入口中挹之九十過自飽便止此當一吸輙一咽令三炁入藏府分流貫澈數卑炁歇云此童初范監幼仲受髙无君太素内景法事鮮而易驗服霧法當以平旦於靜寢之中坐卧任意先閉目内視髣髴如見五藏因臨目口呼出五色炁二十四過使目見五色氣相纒遶在面上鬱然乃又口内此五色氣五十過畢咽液六十過微祝曰太霧發暉靈霧四遷結炁宛屈五色洞天神煙合啓金石華眞藹鬱紫空錬形保全出景藏幽五靈化分合明扇虚時乗六雲和攝我身上昇九天畢又叩齒七通咽液七過乃開目此含眞臺主女眞張微子所受東華法按此是五藏出炁而云服霧者當以所呼出二十四炁是藏炁藏氣因與外天地霧炁和合來入故頓納五十過也守玄白法常平旦坐卧任意存泥丸中有黒氣心中有白氣臍中有黄氣三氣俱出如小豆漸大纒繞合共成一以覆身因變成火火又燒身使内外洞徹如一旦行至日中乃止於是服氣一百二十過都畢云此杜廣平所受介琰胎精中景黒白内法却辟萬害長生不死先禁房室及一切肉五辛味行之三十年遁形隱身日行五百里服開心符法毎開日及月旦十五日二十七日旦向王朱書再拜祝曰五神開心徹聽絶音三魂攝精盡守丹心使我勿忘五藏逺㝷畢乃服符服畢咽液五過叩齒五通勿令人見云此王君所說明堂内經開心辟志符當以朱書白紙預畫十許乃各以其日左手執符拜服之遏邪大祝每經危嶮之路鬼廟之間諸有疑難之處當先反舌内向咽液三過以左手第二第三指捻鼻孔下中鬲内際三十六過於按中隂數勿舉指許叩齒七通進手心以掩鼻臨目微祝曰朱鳥凌天神威内張山源四鎮鬼精逃亡神池吐炁邪根伏藏魂臺四明瓊房零琅玉眞巍峩坐鎮明堂手暉紫霞頭建晨光執詠洞經三十九章中有辟邪龍虎截嶽斬崗猛獸奔牛銜刀吞鑲揭山钁天神雀毒龍六領吐火啖鬼之王電猪雷父掣星流横梟磕駮灼逆風横行天禽羅陳皆在我傍吐火萬丈以除不祥群精啓道封落山郷千神百靈併手叩䫙澤尉捧燈爲我燒香所在所經萬神奉迎畢叩齒三通乃開目去手云此出大洞髙上大祝法使天獸來衛千精震伏酆都大祝先臨目存見五藏令具叩齒三十六下乃祝曰四言輙一啄齒爲節天蓬天蓬九元殺童五丁都司髙刁北公七政八靈太上浩凶長顱巨獸手把帝鐘素梟三神嚴駕夔龍威劔神王斬邪滅蹤紫炁乘天丹霞赫衝呑魔食鬼横身飲風蒼舌緑齒四目老翁天丁力士威南禦凶天騶激厲威北銜鋒三十萬兵衛我九重辟尸千里去却不祥敢有小鬼欲來見狀钁天大斧斬鬼五形炎帝裂血北斗然骨四明破骸天猷滅𩔖神刀一下萬鬼自潰畢若白日冥夜及困病得祝爲恒祝之鬼有三被此祝眼睛爛而死云此酆都北帝秘祝中皆斬鬼之司名秘宻則爲用世人得此祝恒能行便不死之道六宫名祝暮欲卧時先向北微祝曰吾是太上弟子下統六天之宫是吾所部不但所部乃太上之所主吾知六天門名是故長生敢有犯者太上斬汝第一官名爲紂絶隂天宫以次東行第二宫名爲大殺諒事宗天宫第三宫名爲明晨耐犯武城天宫第四宫名爲恬照罪炁天宫第五宫名爲宗靈七非天宫第六宫名爲敢司連宛屢天宫畢啄齒六下又祝几三過止乃卧辟諸鬼邪之氣云此定録所告世人有知酆都六天宫門者則百鬼不敢爲害酆都頌項梁城作酆宫頌曰紂絶標帝晨諒事遘重阿炎如霄中煙勃若景耀華武城帶神鋒恬照吞青河閶闔臨丹井雲門鬱嵳峩七非通竒蓋連宛亦敷魔六天横北道此是鬼神家夜中微讀之能辟鬼此皆六宫門名故鬼亦畏之武陽與成城爲異今但各隨所用而呼之又夜行當啄齒啄齒亦無止限數殺鬼邪鬼常畏啄齒聲若兼之以漱液祝說益佳仙方云常吞液叩齒使人反少世間下土惡彊之鬼多作婦女以惑試人若遇此者便閉氣思天關之規衡輔之星具身神正顔色定志意熟視其眼中童子闇濁不明者則鬼試也急存七星在面前亦可在頭上以却之冝用七星天目祝并存洞房明堂日月反規丹太一眞君亦可用天蓬朱鳥諸宫也若眼中明徹及方者仙道人也便拜請之不悟眞爲試不過若遇邪而謂眞人亦試不過深冝愼之服神藥勿向北亥子日勿唾出沈義口訣道士結頭理髮及飲食施爲履屐枕褥皆勿令非道者見而干犯之出陳世安口訣服食藥物尤不欲食蒜及石榴子猪犬肉出黄元君口訣服食勿食含血物一切肉敗人功耳出程偉妻口訣求仙不欲見死屍唯父母師主不得不親臨致哀耳出李少君口訣求仙者勿以三月九日六月二日九月六日十二月三日與女子相見此日男女三尸出於目中更相招引禍害往來入室斷隔爲善出劉綱妻口訣求仙勿與女子交接一交輙傾一年之藥勢出東海小童口訣道士有疾當閉目内視心使生火以燒身令盡是痛處皆存火燒之出鳯綱口訣學道勿言有道夜閉目存眼童子在泥丸中令内視身神出東陵聖母口訣暮卧存日在額上月在臍上辟萬邪千鬼出青牛道士口訣入山未至山百歩先却百歩反足乃登山山精不敢犯出吕恭口訣行經靈廟間存口中有眞人字赤靈丈人侍以玉女二人一女名花正一女名攝精丈人著赤袍玉女黄衣乃叱咤曰廟中鬼神速來使百邪詣赤靈丈人受斬死衆邪却千里此三天前驅捕鬼之法欒巴口訣此後應入三皇青胎卷中所用符事又禁山符中事並未撰上清握中訣卷中
