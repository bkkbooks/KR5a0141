body:
  text: 卷上闕文玄上太微北極紫蓋下有太真遊翔九外翠華飛裙金鈴青帶腰佩玉光玄雲晻藹賜某隱書上行七氣登清戲煙真人合會乞丐飛仙書名丹界所向所願無災無害有惡我者令彼傷敗次乘虛躡景從北極上俱上天關右手拊心左手指天關閉氣三息叩齒三通咽液三過微祝曰太上七極紫微絕辰寶玄金房外有玉門周運九宮謂和天關中有尊神號曰紫皇授某隱書攜某乘龍上浮九天下飛地元景雲丹輿玄華翠裳腰佩龍策頭巾虎文包生萬物教化飛仙脫某死名天地長存乘龍步斗所向受恩有惡我者風刀火燃遊行三命從天關上俱上輔星閉氣一息叩齒三通咽液一過微祝曰太極輔星精在紫關養生育命寶守神魂金房再開奉見輔君賜某隱書使某遊旋列名聖皇飛仙九天巾金佩真出入洞門徘徊三陽從輔星上俱上弼星閉氣一息叩齒三通咽液一過微祝曰太虛泥丸紫宮天尊玄空真紐為帝之先精入明堂疆胎益魂朱山再開奉迎靈元左挹日華右掇月根流火萬丈金羅碧裙腰帶虎符首戴花冠賜某隱書得行天關乞願飛仙役使萬神萬向皆會福德如山朝四極春步綱畢正身入魁中東向視歲星象在肝中再拜跪祝曰太歲元神木公九元陽華玄元盡來入身叩齒九通夏步綱畢正身入魁中南向視熒惑星象在心中再拜跪祝曰南上元神火陽四光重離丹火來入丹房叩齒九通秋步綱畢正身入魁中西向視太白星象在肺中再拜跪祝曰西上太玄金精七道玉元二帝氣回胎腦叩齒九通冬步綱畢正身入魁中北向視辰星象在腎中再拜跪祝曰北玄紫辰金車水元龍胎化靈來入一身叩齒九通甲子日八節日步綱畢正身入魁中弼星後向真人存鎮星象在脾中再拜跪祝曰太極九真流康陰根飛一華蓋來入泥丸叩齒九通步綱脫死名上玉錄法亦如此但用有異耳右六甲日步者出仍左迴向下台閉氣隨綱禹步躡星上至金上往還九過畢住金上叩齒三下通氣祝曰上台虛精中台六淳下台曲生次步五星先向綱口臨目閉氣叩齒五通咽液五過存五星精各在五藏中微祝曰五星列照煥明五方水星卻災木星致昌熒惑消禍太白辟兵鎮星四據我得利貞名刊玉簡錄字帝房乘飆扇景飛騰太空出入冥無遊宴十方五雲浮蓋招神攝風役使萬靈上衛仙公又心祝五星皇君夫人名字通息更閉乃越綱蹈星左足上金右足進併隨方面向之左手拊心曰飛仙次上土上火上木上水又倒上木如此往還三過又依圖上金上火上土上木上水又倒上木如此往還十五過止乃下左迴向綱口存祝如每至星上皆併足左手拊心呼所至星皇君君夫人名字心祝飛仙都畢乃跪卷圖而還若見兇鬼惡人存斗星覆頭以杓指前閉氣心祝曰吾是天目與天相逐精若雷電明曜八域徹知表裏無所不伏行飛步一年辟非二年辟兵三年辟死四年地仙行之十四年為上清真人列紀行事訣月晦日夜半東向朱書日氣符於青紙上黃書月精符於青紙上先左手執日符閉氣心祝曰太微丹書名曰開明致日上魂來化某形平旦嚴裝發自圓庭飛華水母日根金精紫映流光號為五靈乃服之又右手執月符閉氣心祝曰紫微黃書名曰太玄致月華水養魄和魂方中嚴事發自玄關藏天隱月五靈夫人飛光九道映朗泥丸乃服之服日氣法平旦伺日初出乃對日叩齒九通心呼日魂珠景照韜綠映迴霞赤童玄炎飆像仍冥目握固存日中五色流霞皆來接身下至兩足上至頭頂又令光霞中有紫氣如目童累數十重與五色俱來入口吞之四十五咽氣又咽液九過叩齒九通微祝曰赤爐丹氣圓天育精剛以受柔炎水陰英日辰元景號曰大明九陽齊化二煙俱生凝魂和魄五氣之精中生五帝乘光御形探飛以虛掇根得盈首巾龍蓋披朱帶青轡烏流玄霞映上清賜書玉簡金閣刻名服食朝華與真合靈飛仙太微上昇紫庭再拜服月精法伺月初出對月叩齒十通心呼月魄曖蕭芬豔翳寥婉虛靈蘭鬱華結翹淳金清瑩炅容臺標仍冥目握固存月中五色流精皆來接身下至兩足上至頭頂又令光精中有黃氣如目童累數十重與五色俱來入口吞之五十咽氣又咽液十過叩齒十通微祝曰黃青玄暉元陰上氣散蔚寒飆條靈歛胃靈波蘭穎挺濯渟器月精夜景玄宮上貴五君夫人各保母位赤子飛入嬰兒續至迴陰三合光玄萬方和魂制魄五胎流通乘霞飛精逸虛於東首結靈雲景華招風左帶龍符右腰虎章鳳羽朱帔玉珮金璫騫樹結阿號曰木王神蟆控根有虧有充明精內映玄水吐梁賜書玉札刻名靈房服食月華與真合同飛仙紫微上朝太皇再拜拘三魂法其日夕臥去枕向上伸足交手心上冥目閉氣三息叩齒三通存心有赤炁如雞子從內仰上從目中出外轉大覆身變成火燒身周帀內外洞徹如一叩齒三通呼爽靈胎光幽精三神急住因微祝曰太微玄宮中黃始青內鍊三魂胎光安寧神寶玉室與我俱生不得妄動監者太靈若欲飛行唯得詣太極上清若欲飢渴唯得飲徊水玉精制七魄法其日夕臥向上伸足兩手掌掩兩耳冥目閉氣七過叩齒七通存鼻中端有白氣如小豆須臾漸大冠身九重忽又各變成天獸如此良久咽液七過叩齒七通呼尸狗伏矢雀陰吞賊非毒除穢臭肺又微祝曰素氣九迴制魄卻姦天獸守門嬌女執關鍊魄和柔與我相安不得妄動看察形源若汝飢渴聽飲月黃日丹凡暮臥先存泥丸宮赤子字三元先一名帝卿絳宮真人字子南丹一名中光堅丹田宮嬰兒字元陽子一名谷下玄頭並如嬰兒有金光玉色又存臍中命門玄闕生宮大君著朱衣巾紫蓉冠手執天皇象符向外坐乃閉氣二十四息心呼挑孩字合延咽液五十過叩齒三通微祝曰胎靈大神皇綱天君手執胞符首巾紫冠黃迴赤轉上精命門化神反生六合相因形骸光澤玉女奉身先存此乃拘魂制魂又以月朔望日夜半朱書天皇象符於青紙上北向左手執符閉氣心祝曰天帝玄書皇象靈符以合元氣運精反胎萬年嬰孩飛仙天樞生宮大神披丹建朱首戴紫蓉與我同謀服畢再拜
