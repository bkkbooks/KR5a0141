body:
  text: 卷下蘇君傳行事訣人頭有九宮兩眉間上卻入三分為守寸一寸為明堂宮二寸為洞房宮三寸為丹田泥丸官四寸為流珠宮五寸為玉帝宮明堂上一寸為天庭宮洞房上一寸為極真宮丹田上一寸為玄丹官流珠上一寸為太皇宮凡一頭中有九宮並各方一寸守一法立春日夜半東向平坐閉氣臨目握固兩膝上先存守寸中左有絳臺臺中有青房房中有神著青衣右有黃闕中有紫戶紫戶中有神著紫衣手並執流金鈴仍三呼其名微祝曰紫戶青房有二大神手把流鈴身坐風雲俠衛真道不聽外前使我思感通利靈關出入貞利上登九門即見九真太上之尊次存明堂中左有明童真官中央有明鏡神君右有明女真官頭形並如嬰兒著緑錦衣腰帶四赤玉鈴口銜赤玉鏡長跪坐向外口並吐赤氣貫我身令匝及閉目微咽之又使鳴玉鈴吐鏡赤光萬丈須臾赤氣繞身變成火燒身內外同光如一因三呼名字叩齒九通若飢渴若暗行若處危難次存洞房中左有無英君著芙華冠御紫晨蓋佩流金鈴向外坐乃微祝曰三元英氣太玄紫晨黃闕金室中有大神華冠紫蓋龍衣虎文出丹入虛呼陰召陽天道有真名曰無英扶我生我與我長存又存右有白元君著黃辰華冠龍文衣佩神虎符向外坐乃微祝曰太上神精正當神門龍衣虎帶黃辰華冠把籍持書是為白元與我俱遊上到陽關周遊九清還安黃房此洞房法又常以夜半後生氣時按手兩膝閉氣冥目內視咽液百二十遍存無英君服色祝説如法又以日出東向再拜閉氣冥目內視咽液百二十過存白元君服色祝説如法又以甲子日夜半後被髮傅粉按手兩膝服氣咽液百四十過乃呼二神名字立春東向立夏南向立秋西向立冬北向春分日夜半正坐東向冥目存北斗星下紫氣大如絃從上直注我前令三一三卿及我合七人並覆匝七星杓指前鴈行共乘紫氣上登陽明星入中共坐並吞紫氣三十過畢乃悉更緣紫氣來下還入三宮中心祝曰三尊上真太玄高神陽明主春萬童開門丹元主夏朱紫合煙陰精主秋天威六陳北極主冬萬邪塞姦五土季王戊己天關所摧皆滅所向莫干鍊我七魄和我三魂生我五藏使我得真登飛上清浮景七元長生順往嘯命千神夏至南向登丹元星秋西向登陰精星冬至北向登北極星皆依此法若六月一日或十五日當西南向俱乘絳紫青黃四氣共登天關星吞四色氣各十過此謂五斗內法每建日平旦存三一從三宮中出坐我前如實見之乃小起再拜心祝曰天尊三帝守其命門出遊雲中六氣玄分養我五神正我三魂五藏自生長生飛仙乃存從虛中還三官中咽液三十過止除日夜半密起向北仰視北斗存三一從輔星中下來各入我三宮中乃還寢靜思存而微祝曰太上天輔三帝所遊三卿扶胥與真合俱下入我身安寂坐無吐精灌形魂魄和柔使我飛仙雲車行浮咽液二十過每開日夜半起坐東向去巾微祝曰上元三真真中嬰兒成愛開煙上通天台泥丸堅凝與天同時使卷飛仙交行洞臺咽液十九過乃巾而寢更存三一三卿各對坐其宮三一口呼氣三十過我亦自呼三十遍甲午甲辰甲寅日夜半出庭露壇上方一丈布席燒香北向再拜坐按手膝上仰視北斗存紫氣從斗出入我三宮中三一三卿與我俱乘紫氣上登北極星恍惚亡身如升天之狀見北極中紫房玉階天官序列此七人侍帝前對坐論道請乞飛仙我乃心拜次北向存玄丹宮中紫房緑室朱煙滿內有太一真君頭形並如嬰兒著紫繡錦衣腰帶流金火鈴左把北斗星柄右把北辰綱向外坐金床玉帳存令分明見之乃又存北極星紫氣來下入宮滿溢出外匝身通洞合體又存日來入宮在紫氣中央曖曖然又存太一真君從北極紫氣中來入日中坐又存我忽上入在君前對坐心起再拜稽首膝前問道求仙因吞紫氣三十過咽液三十過又存北斗內有一赤氣如弦徑下三宮太一與我乃俱乘日行赤氣上詣斗魁中寢此法亦獨行不必待三一也月一日三日七日十一日十五日者夜半存太一真君名字服色如前向外坐口吐青氣下入我口中隨咽之五十過止咽液五十過微祝曰太上真皇中皇紫君厥諱規英字曰化玄金床王帳紫繡錦裙腰帶火鈴斬邪滅姦手把星精項生日真正坐吐氣使我咽吞與我共語同宴玄丹鍊灌七魄和柔三魂神靈奉衛使我飛仙五藏自生還白童顏受書上請司命帝官所願所欲百福惟新存我上入官在太一前寢息凡守一旦起皆咽液三十過存令赤色又手拭面耳令熱自非應存之日者唯存三一在三宮中安坐而已至於玄宮自多存之勿令脫也若忽覺頭頸間色色惡者惡氣入也當急臥臨目存玄丹宮太一真君以流火鈴煥而擲之令惡氣即出耳外火光亦隨之炯炯以照一身良久平復也若忽耳鳴者是他鬼邪欲入故守寸三神令耳神嬌女雲儀磬鐘警備也錯手掩耳祝曰赤子在宮九真在房請聽神命亦察不祥太一流火以滅萬凶若臨飲食皆先存一飲食然後乃食畢心祝曰百穀入胃與神合氣填補血液尸邪亡墜長生天地飛登金闕役使六丁靈童奉衛常伺月初出向月再拜心祝曰太陰玄精明月夫人初生流光照我三宮神仙上飛高遊八方所向所願與福神中八節之日朱書三元真符平旦向王吞一畢再拜朔日初服十六日止後節復起如初又朱書白素錦囊盛佩頭上正月朔旦青書寶章北向再拜吞之又朱書白素佩左肘相見以金長九寸廣四寸厚三分刻書之以封掌五嶽山精神也赤將子鍊形法夜臨目向口吸取光存燒身使內外洞徹如火為之三年能入火此周君訣茅君傳行事訣存明堂玄真法寢靜之室平旦瞑目按手膝上旦存日夜存月並大如鐶以對口去之九尺日色赤有紫光九芒月色黃有白光十芒芒直如弦以入口日月中有太玄上玄丹霞玉女冠紫芙蓉著朱錦帔裙正向我面自稱如此因吐赤氣注我口中我隨吐隨咽九十過覺日月漸來薄面玉女口亦綴我口上氣液皆入我口中乃微祝曰太霄紫真明堂陰神日月生精玉女纏璇先自靈誕厥字密真首巾紫華芙蓉靈冠身披錦帔朱丹飛裙出日入月天光幽芬口吐絳氣灌我三元面覩天井柔魄制魂玄液流行胎精長全五藏生華開童反顏監御萬靈司命飛仙存玉女口津液注我口漱滿咽之九十過正若不得服時當存二景還明堂中日左月右令光輝與目童合映又以月旦日本命日夜半東向朱書陽符青紙上黃書陰符青紙上乃臨目存日紫光月黃氣在明堂中明洞一身以左手執陽符閉氣心祝曰二景流精光映某形左回日華右掇月英混合二氣灌溉三田飛霞玄映保固靈根使某長生天地同存服之畢再拜又右手執陰符閉氣祝曰黃氣陰華陽精洞鮮五神柔鍊三左固津二景輝煥流霞灌真陰陽通氣回黃注丹舉體遁變上升帝官服之畢再拜王君傳行事訣生氣時坐臥任意叩齒九通陰祝曰東方青牙紫雲流霞三素徘徊玄霜玉羅服食晨暉飲以朝華次叩齒九通祝曰南方朱丹霞暉太微九道絳煙散布景輝服食靈晨飲以丹池次叩齒九通祝曰西方明石飛霞金液服食太明素雲之精飲以玉液神華啓靈使我登虛上升高清次叩齒九通祝曰北方玄滋慶靈啓胎緑霞敷晨紫蓋蒼旗服食丹華飲以瓊飴次叩齒九通祝曰戊巳之元黃素五雲四霞紫觀八景九晨二明激暉七曜靈尊和精灌氣服食中元琳華龍胎飲以醴泉夜半後皆可行魏夫人傳行事訣暮燒香讀黃庭內景經一通旦夕朝靜法本命甲午後數得九十日是甲子凡二日平旦入靜燒香北向朝太微帝君微祝曰糞土小兆男生姓名謹稽首再拜朝太微天帝君王闕紫宮前當令某長生神仙所欲所願萬事成就司命紫簡記在王皇得為物宗登仙度世再拜正月一日後數一百八十二日夜半入靜燒香朝太上玉晨大道君跪微祝曰姓名小兆謹稽首再拜太上高聖君瓊闕下乞得告下司命記籍長生所向所願萬物自成神仙飛仙得宴九天凡入靜皆先潔口閉氣入戶先前右足著前進左足併乃得趣行耳出戶勿反顧之漱口而退修行寶神訣掌摩兩掌令熱以拭面使匝熱月五日十五日二十五日二十九日夜半存日象從口入在心中照心內光明祝曰太明育精內鍊丹心光暉合映神真來尋臥起平坐先收兩手乃度以掩項仰面與爭三四過乃屈動身體伸手四極反張側掣宣搖百關三過恆以手按兩眉後小穴中三九過又以手心及指摩目下顴上又以手旋耳行三十過又以手從眉中逆乘額上行入髮際三九過內存赤子日月雙明上元歡喜口傍咽液
