  - {type: variant, offset: 3226, length: 0, content: '', HFL: 謂若浴者益隹但不用此水以沐浴錬形之素漿正宜以浴耳如便不得以此汁沐頭更别依常沐法也又云世間符水祝漱水含之近術皆莫比於此方也如此亦許有符水别法正一道士乃自有常用而八吏六甲别有一符水於解殗爲勝令輙附䟽於此幸可兼用之朱書白紙如此巳著清水中向王左手執水器右手執一劒叩齒三通嘘水祝曰}
