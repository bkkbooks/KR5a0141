body:
  text: 卷中守玄丹法其月一日三日七日十一日十五日夜半所存即與三一同法其常日夕當依今事其暮夕靜寢去諸思念先存北極辰星出一紫氣如弦來下入玄丹宮須臾滿宮溢出外匝身通洞與紫氣合體又存日忽飛來入宮在紫氣中晃晃然乃存上清中黃太一真君從北極紫氣中來入日中坐服色名字把執悉如前因三呼位號名字忽存我入在太一前再拜稽首問道求仙因乃咽紫氣三十過咽液三十過又存北斗魁中出一赤氣如弦直入來玄丹宮於是真君與我共乘日入行赤氣道中上詣魁中寢注想令分明於是仍以寢即有真感其非夕時亦當恆存太一在玄丹官并出紫氣以繞身及咽之也若聞耳鳴錯手掩耳祝曰赤子在宮九真在房請聽神命亦察不祥太一流火以威萬凶手指耳門七過覺面熱者佳若項間色色寒者惡氣入當急臥臨目存玄丹太一真君以火鈴煥而擲之令惡氣即出耳外火光亦隨之炯炯以照映一身良久平復凡諸聞見不吉並精存真君以求救護則萬凶不干大靜法守一之人每以甲午甲辰甲寅日夜半掃除靜寢之庭亦可作壇方一丈障四面布席燒香向北再拜平坐按手臨目存三宮三一如法又存三素雲氣各在宮中三人在氣中三素者紫青絳衣次重沓之因仰視北斗存紫氣從魁中出如弦直來入口分注三宮於是三一三卿及我乘三素雲忽出共乘紫氣上登斗魁因乘三素度入北極中見紫房玉階天官序列太一帝君巾紫晨冠龍錦鳳衣向南坐我等七人登階北向拜求乞飛真長生之道良久自忘如在天上久久乃密起還寢陰雨可於寢床存之上建日平旦向王平坐閉氣臨目內視三宮三一三卿如法乃存忽出在我前對坐我乃心起各再拜令如見乃心祝曰天尊三帝守某命門出游虛中六氣玄分養我五神正我三魂五藏自生長生飛仙又存從虛中忽還三宮如法而住乃咽液三十過久行之當夢見金玉白鳥諸物見一之漸也上除日夜半密起向北仰視北斗內像輔弼之形忽見三一三卿從輔星中出來下入三宮中仍還室更閉氣臨目內視精思如法良久微祝曰太上天輔三帝所遊三卿從胥與真合俱下入我身安寂坐無吐精灌形魂魄和濡使我飛仙雲車行浮咽液二十七過每開日夜半起坐東向去巾亦可解髮更梳結之臨目內視微呼曰上元三真真中嬰兒散髮開煙上通天台泥丸堅凝與天同時使我飛仙交行洞臺咽液十九過乃巾而臥更存三一宮中呼氣三十過我亦自呼氣三十過當覺令身中薰薰熱則和魄凝魂之驗月初出向月再拜存月白光十芒來接我身洞照三宮乃心祝曰太陰玄精明月夫人初生流光照我三宮神仙上飛高遊八方所向所願皆與福中亦可再拜臨食初就食皆先正心目想三一各於其宮遙共歆饗畢乃食食畢心祝曰百穀入胃與神合氣填補血液尸邪亡墜長生天地飛登玉闕役使六丁靈童奉衛巾斗卻惡守一出入行住恆存北斗覆頭柄指前令天關去面七尺如此百邪凶氣不敢干犯也尋此要訣亦可兼作飛步祝曰吾是天目與天相逐精若電雷明曜八域徹視表裏無物不伏吸火鍊形夜臨目向火口吸取火光咽之無數存覺身匝體洞然如火食久乃止三年行之能入火坐此赤將子鍊形法朝太素正月九日二月八日三月七日四月六日五月五日六月四日七月三日八月二日九月一日十月十日十一月十一日十二月十二日夜於寢靜室北向再拜稽首跪曰謹啓太上大道高虛玉晨太素紫宮八靈三元君中央黃老無英白元太帝五老高真上仙太極黃精三皇玉君大洞三景弟子某甲謹以告日之夜天關九開之間上聞太上玉皇真君乞得長生世上壽無億年時乘黃晨緑蓋龍轅上詣紫庭沒使萬神侍衛四明畢勿令人知云施行太丹隱書存三元洞房者此謂修先進之法非關三一乃諸訣法若未行此道謂亦不得用此拜請而此日是月中吉辰宜為諸善事朝玉晨正月四日二月八日三月十五日四月八日五月九日六月六日七月七日八月八日九月九日十月五日十一月三日十二月十二日平旦日出時北向再拜自陳本懷所願畢咽液三十六過云此日太上大道玉晨君登玉霄琳房四眄天下有志節遠遊之心者是故令拜請先應呼位號如朝法云糞土小兆某甲乞願云云也若雨雪可於靜室中啓請畢更再拜仍長跪咽液止朝青君丁卯日日出向日再拜請乞九月後正月前日出同其方可因此以服日精此日東海青童登方諸東華臺四望按方諸在會稽東小近南著則應對乙地若夏月日出東北便不得正向日存拜東華所在啓請若請乞畢又再拜乃修日事受者但吸服霞精而九咽之精思常以二月二日三月三日八月八日九月九日十月十日夜於寢室存思洞中訣事燒香念真精苦勿眠如有所待兼慎於其日益善云修洞訣者其日衛經玉童玉女將太極典禁真人來於空中觀察善惡故令謹慎勿為他事唯營道務修諸善法也惡夢若遇惡夢覺以左手捻人中二七過啄齒二七通微祝曰大洞真玄張鍊三魂第一魂速守魄第二魂速守泥丸第三魂受心節度速啓太上三元君向遇不祥之夢是七魄遊尸來俠邪源急召桃康護命消滅惡津反凶成吉生死無緣畢又臥必獲善應善夢若遇善夢臥覺當摩目二七過叩齒二七通微祝曰太上高精三帝丹靈絳宮明徹吉感告情三元柔魄天皇授經所向諧合飛仙上清常與玉真俱會紫庭夫夢惡者明旦當啓太上以正魂魄折除不祥當朝拜仍啓乞首謝除之枕麝香一具於頸間辟水注之氣絶惡夢也若每夢冢墓及亡者臥覺正向上三啄齒而祝之曰太元上玄九都紫天理魂護命高素真人我受上法受教太玄長生久視神飛體仙冢墓永安鬼訟塞姦魂魄和悅惡氣不煙遊魅岡象敢干我神北帝呵制收氣入淵得籙上皇謹奏玉晨如此者再祝祝又三叩齒夜臥覺常更急閉目叩齒九通咽液九過畢以手按鼻之邊左右上下數十過微祝曰太上四明九門發精耳目玄徹通真達靈天中之臺流氣調平嬌女雲儀眼童英明華聰炅朗百度眇清保和上元徘徊九城五藏植根耳目自生天臺鬱素柱梁不傾七魄澡鍊三魂安寧赤子攜景輒與我并有敢掩我耳目太上當摧以流鈴萬凶消滅所願必成日月守門心藏五星真皇所祝群響敬聽畢又咽液九過摩拭面目令小熱以為常臥覺輒按祝如此勿失一臥也夜臥覺存日象在疾手中握之使日光赤芒從臂中逆至肘腋間良久日芒忽變成火以燒臂使內外通匝洞徹良久乃陰祝曰四明上元日月氣分流光煥曜灌液凝魂神火散景蕩穢鍊煙洞徹風氣百邪燔然使得長生四古完全注害考鬼收付北辰畢存思良久放身自忘常以生氣時咽液二七過按體所痛處向王而祝曰左玄右玄三神合真左黃右黃六華相當風氣鬼疾伏匿四方玉液流澤上下宣通內遣水火外辟不祥長生飛仙身常休彊畢又咽液二十七過常如此則無疾手臂不援者先以一手徐徐按摩疾臂良久畢乃臨目內視叩齒咽液三過正心微祝曰太上四玄五華六庭三魂七魄天關地精神府營衛天台上明四支百神九節萬靈受籙玉晨刊書玉城玉女侍身玉童護命永齊二景飛仙上清長與日月年俱後傾超騰升仙得整太平流風結痾注鬼五飛魍魎冢氣陰氣相凌徊我四支干我盛衰太上天丁龍虎曜威斬鬼不祥風邪即摧考注匿訟百毒隱非使我復常日月同暉考注見犯北辰收摧如干明威夜臥先急閉目東向以手大指後掌各左右按拭目就耳門使兩掌俱交會於項中三九過存目中各有紫青絳三色氣出目前乃陰祝曰眼童三雲兩目真君英明注精開通清神太玄雲儀靈嬌翩翩保利雙闕啓徹九門百節應響朝液泥丸身升玉宮列為上真畢咽液五十過乃開目以為常坐起可行之不必夜要當以生氣時中暮咽液三九過以手急陰按天真山源華庭陰數三九過按而祝曰開通天庭使我長生徹視萬里魂魄反嬰滅鬼卻魔來致千靈上升太上與日合并得補真人列像玄名恆以手按兩眉後小穴中三九過又以手心及指摩兩目下顴上又以手旋耳行三十過畢輒以手逆乘額三九過口傍咽液多少無數頭四面亦以兩手乘之順髮就結唯令多都畢乃以指按目四眥二九覺令見光分明勤而行之唯令數無時節也面上常欲兩手摩拭使熱臥起先以手巾帛拭項中四面及耳後皆使溫溫然又順髮摩頭又摩掌以治面目都畢咽液三十過臥起當平氣正坐先叉兩手乃度以掩項後因仰面使項與手爭三四過仍屈動身體伸手四極反張側掣宣搖百關為之各三常欲以手按目近鼻之兩眥閉氣為之氣通輒止吐而復始恆行之眼能洞觀耳欲數按抑其左右令無數鼻亦欲爾又常以手掩口鼻臨目微氣久時手中生液追以摩面目使人體香坐常欲閉目內視存見五藏腸胃久行之自得分明常欲閉目而臥安身微氣乃內視遠聽四方令我耳目注萬里之外精心為之乃見百里外事亦恆聞金石絲竹之聲初雖無髣佛久久誠自入妙櫛頭理髮當向王地櫛髮之始微祝曰泥丸玄華保精長存右為隱月左為日根六合精鍊萬神受恩畢咽液三過澡洗時常存六丁令人所向如願當數沐浴浴不患數患人不能耳蕩鍊尸臭而真氣來入每至甲子當沐不爾當以幾月旦使人通靈若履殗穢及諸不淨處當洗澡浴盥解形以除之其法用竹葉十兩桃皮削取白四兩以清水一斛二斗煮令一沸適寒溫以浴形即萬殗消除也百殗之鬼速去萬里不去斬死西方白童子輒以劍三叩器邊又祝又叩齒凡三過止因取水漱口自身他身及穢處所殗便解不必須浴服仙藥常向本命服畢勿道死喪凶事犯傷胎神徒服無益臨食上勿道死事勿露食物來衆邪氣上道法布衣不假人車服床寢不共之也坐臥室宇當令潔淨則受靈氣不淨則受故氣故氣之亂室宇者所為不成所作不立一身亦當數洗浴澡潔不爾仙道無冀沐浴不數魄之性也違魄反真是鍊其濁穢魄日亡矣數沐浴常存六丁令人所向如願慎勿道學道學鬼犯人亦不懼立使人病是體未真故也凡寫經書當恆燒香左右凡精思皆燒香於左右性躁暴者一身之賊病每事皆當柔遲而盡精潔之理夫欲學道者皆當忽令人知見所聞每事盡爾存日在心法以月五日十五日二十九日夜半存日從口入在心中照一心之內與日共光相合會良久當覺心暖乃祝曰大明育精內鍊丹心光輝合映神真來尋咽液九過服日月象法男服日象女服月象日一勿廢服日芒法平坐臨目直存心中有日象大如錢赤色紫光九芒從心上出喉至齒間未出齒而回還胃中良久存見心胃中分明乃吐氣漱液服液三十九過止一日三為之服月芒法夜存月在泥丸中黃色有白九十芒亦未出齒而回入胃當以亥子丑時月徑一寸在丹田宮其十白芒流下口中咽入喉到胃令白光照徹亦應吐氣服液三十九過臥存之亦可服三氣法常以平旦向日臨目存青氣白氣赤氣各如線從日下來直入口中挹之九十過自飽便止服霧法當以平旦於靜寢之中坐臥任意先閉目內視髣佛如見五藏因臨目口呼出五色氣二十四過使目見五色氣相纏繞在面上鬱然乃又口內此五色氣五十過畢咽液六十過微祝曰太霧發暉靈霧四遷結氣宛屈五色洞天神煙合啓金石華真藹鬱紫空鍊形保全出景藏幽五靈化分合明扇虛時乘六雲和攝我身上升九天畢又叩齒七通咽液七過乃開目守玄白法常平旦坐臥任意存泥丸中有黑氣心中有白氣臍中有黃氣三氣俱出如小豆漸大纏繞合共成一以覆身因變成火火又燒身使內外洞徹如一旦行至日中乃止於是服氣一百二十過都畢服開心符法每開日及月旦十五日二十七日旦向王朱書再拜祝曰五神開心徹聽絶音三魂攝精盡守丹心使我勿忘五藏遠尋畢乃服符服畢咽液五過叩齒五通勿令人見遏邪大祝每經危嶮之路鬼廟之間諸有疑難之處當先反舌內向咽液三過以左手第二第三指捻鼻孔下中鬲內際三十六過叩齒七通進手心以掩鼻臨目微祝曰朱鳥凌天神威內張山源四鎮鬼精逃亡神池吐氣邪根伏藏魂臺四明瓊房零琅玉真巍峨坐鎮明堂手暉紫霞頭建晨光執詠洞經三十九章中有辟邪龍虎截嶽斬岡猛獸棄牛銜刀吞鑲揭山钁天神雀毒龍六領吐火啖鬼之王電豬雷父掣星流橫梟磕駮灼逆風橫行天禽羅陳皆在我傍吐火萬丈以除不祥群精啓道封落山鄉千神百靈併手叩顙澤尉捧燈為我燒香所在所經萬神奉迎畢叩齒三通乃開目去手酆都大祝先臨目存見五藏令具叩齒三十六下乃祝曰天蓬天蓬九元殺童五丁都司高刁北公七政八靈太上浩凶長顱巨獸手把帝鐘素梟三神嚴駕夔龍威劍神王斬邪滅蹤紫氣乘天丹霞赫衝吞魔食鬼橫身飲風蒼舌緑齒四目老翁天丁力士威南禦凶天騶激厲威北銜鋒三十萬兵衛我九重辟尸千里去卻不祥敢有小鬼欲來見狀钁天大斧斬鬼五形炎帝裂血北斗然骨四明破骸天猷滅類神刀一下萬鬼自潰畢若白日冥夜及困病得祝為恆祝之鬼有三被此祝眼睛爛而死六宮名祝暮欲臥時先向北微祝曰吾是太上弟子下統六天之宮是吾所部不但所部乃太上之所主吾知六天門名是故長生敢有犯者太上斬汝第一宮名為紂絶陰天宮以次東行第二宮名為大殺諒事宗天宮第三宮名為明晨耐犯武城天宮第四宮名為恬照罪氣天宮第五宮名為宗靈七非天宮第六宮名為敢司連宛屢天宮畢啄齒六下又祝凡三過止乃臥辟諸鬼邪之氣酆都頌項梁城作酆宮頌曰紂絶摽帝晨諒事遘重阿炎如霄中煙勃若景耀華武城帶神鋒恬照吞青河閶闔臨丹井雲門鬱嵯峨七非通奇蓋連宛亦敷魔六天橫北道此是鬼神家又夜行當啄齒啄齒亦無止限數殺鬼邪鬼常畏啄齒聲若兼之以漱液祝說益佳仙方云常吞液叩齒使人反少世間下土惡彊之鬼多作婦女以惑試人若遇此者便閉氣思天關之規衡輔之星具身神正顏色定志意熟視其眼中童子暗濁不明者則鬼試也急存七星在面前亦可在頭上以卻之若眼中明徹及方者仙道人也便拜請之不悟真為試不過若遇邪而謂真人亦試不過深宜慎之服神藥勿向北亥子日勿唾道士結頭理髮及飲食施為履屐枕褥皆勿令非道者見而干犯之服食藥物尤不欲食蒜及石榴子豬犬肉服食勿食舍血物一切肉敗人功耳求仙不欲見死尸唯父母師主不得不親臨致哀耳求仙者勿以三月九日六月二日九月六日十二月三日與女子相見此日男女三尸出於目中更相招引禍害往來入室斷隔為善求仙勿與女子交接一交輒傾一年之藥勢道士有疾當閉目內視心使生火以燒身令盡是痛處皆存火燒之學道勿言有道夜閉目存眼童子在泥丸中令內視身神暮臥存日在額上月在臍上辟萬邪千鬼入山未至山百步先卻百步反足乃登山山精不敢犯行經靈廟間存口中有真人字赤靈丈人侍以玉女二人乃叱咤曰廟中鬼神速來使百邪詣赤靈丈人受斬死衆邪郤千里此三天前驅捕鬼之法此後應入三皇青胎卷中所用符事又禁山符中事並未撰
